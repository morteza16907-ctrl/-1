<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="طلافروشی">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="theme-color" content="#c9a84c">
<title>طلافروشی</title>
<style>
/* فونت Vazirmatn embed شده — کاملاً آفلاین */
@font-face{font-family:'V';src:local('Vazirmatn'),local('Tahoma');font-weight:400}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d0d0d;color:#eee;font-family:Vazirmatn,Tahoma,Arial,sans-serif;direction:rtl;min-height:100vh}
input,select,button{font-family:inherit;font-size:14px}
.inp{background:#1a1a1a;border:1px solid #2a2a2a;color:#eee;border-radius:8px;padding:11px 12px;width:100%;outline:none;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:#c9a84c88}
label{color:#777;font-size:12px;margin-bottom:4px;display:block}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:10px}
.row{display:flex;gap:8px;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.s2{grid-column:span 2}
.stat{background:#1a1a1a;border-radius:10px;padding:11px 13px;flex:1;min-width:80px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.tabs{display:flex;gap:2px;padding:8px 10px;border-bottom:1px solid #2a2a2a;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;color:#777;border:none;padding:8px 11px;border-radius:8px;cursor:pointer;font-weight:700;font-size:11px;white-space:nowrap;font-family:inherit}
.tab.on{background:#c9a84c;color:#000}
.btn{border:none;border-radius:8px;padding:9px 14px;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit}
.bgold{background:#c9a84c;color:#000;width:100%;padding:13px;font-size:15px;border-radius:10px;margin-top:12px;border:none;cursor:pointer;font-weight:800;font-family:inherit}
.bgold:disabled{background:#2a2a2a;color:#444;cursor:not-allowed}
.mini{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.mc{background:#1a1a1a;border-radius:6px;padding:4px 6px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{color:#444;font-size:11px}
.drop{position:absolute;top:100%;right:0;left:0;background:#222;border:1px solid #333;border-radius:8px;z-index:99;max-height:180px;overflow-y:auto;margin-top:2px;box-shadow:0 4px 12px #000a}
.di{padding:10px 12px;border-bottom:1px solid #2a2a2a;font-size:13px;cursor:pointer}
.di:active{background:#333}
.pbox{background:#0a1a0a;border:1px solid #c9a84c33;border-radius:10px;padding:12px;margin-top:12px}
.pr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1a2a1a;font-size:12px}
.empty{color:#333;text-align:center;padding:40px}
.modal-bg{position:fixed;inset:0;background:#000c;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#141414;border-top:1px solid #2a2a2a;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.stitle{color:#c9a84c;font-weight:700;font-size:13px;margin-bottom:10px}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1a1a1a}
.filt{border:1px solid #2a2a2a;background:#1a1a1a;color:#777;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.filt.on{background:#c9a84c22;border-color:#c9a84c88;color:#c9a84c}
</style>
</head>
<body>
<div id="hdr"></div>
<div class="tabs" id="tabs"></div>

<!-- فرم ثبت — یک‌بار ساخته میشه -->
<div id="pg-new" style="display:none;padding:12px;max-width:700px;margin:0 auto;padding-bottom:40px">
  <div class="card">
    <div class="stitle">🏷️ جستجوی سریع محصول</div>
    <div style="position:relative">
      <input id="quick-inp" class="inp" placeholder="کد یا نام محصول...">
      <div id="quick-drop"></div>
    </div>
    <div id="sel-prod" style="display:none;margin-top:10px;background:#1a2a1a;border-radius:8px;padding:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div id="sel-name" style="color:#4ade80;font-weight:700;font-size:14px"></div>
        <button onclick="clearProd()" style="background:transparent;color:#f87171;border:none;font-size:20px;cursor:pointer">×</button>
      </div>
      <div id="sel-info" style="color:#888;font-size:11px;margin-top:3px"></div>
    </div>
  </div>
  <div class="card">
    <div class="stitle">🎤 ورودی صوتی / متنی</div>
    <div class="row" style="margin-bottom:10px">
      <button id="voice-btn" class="btn" onclick="startVoice()" style="flex:1;background:#1a2a1a;color:#4ade80">🎙️ ضبط صدا</button>
      <button id="ai-btn" class="btn" onclick="doAI()" style="flex:1;background:#1a1a2a;color:#60a5fa">🤖 تحلیل AI</button>
    </div>
    <input id="tr-inp" class="inp" placeholder="یا تایپ کنید...">
    <div id="ai-err" style="display:none;color:#f87171;font-size:11px;margin-top:6px">⚠️ خطا — دستی تکمیل کنید.</div>
  </div>
  <div class="card">
    <div class="row" style="margin-bottom:14px;flex-wrap:wrap;gap:6px">
      <button class="btn type-btn" data-v="sell" onclick="setType('sell')" style="flex:1;min-width:70px">فروش</button>
      <button class="btn type-btn" data-v="buy" onclick="setType('buy')" style="flex:1;min-width:70px">خرید طلا</button>
      <button class="btn type-btn" data-v="buycash" onclick="setType('buycash')" style="flex:1;min-width:70px">خرید نقدی</button>
      <button class="btn type-btn" data-v="service" onclick="setType('service')" style="flex:1;min-width:70px">خدمات</button>
      <button class="btn type-btn" data-v="deposit" onclick="setType('deposit')" style="flex:1;min-width:70px">امانت طلا</button>
    </div>
    <div class="g2">
      <div id="row-item" class="s2">
        <label>نام کالا *</label>
        <input id="f-item" class="inp" placeholder="گردنبند، النگو، انگشتر..." oninput="FORM.item=this.value">
      </div>
      <div id="row-svc" class="s2" style="display:none">
        <label>نوع خدمت *</label>
        <select id="f-svc" class="inp" onchange="onSvcChange(this.value)">
          <option value="">انتخاب کنید...</option>
          <option>تعمیر و لحیم‌کاری</option><option>تغییر سایز</option>
          <option>پولیش و تمیزکاری</option><option>نگین‌کاری</option>
          <option>آب‌طلا</option><option>حکاکی</option><option value="__o">سایر</option>
        </select>
        <input id="f-svc-o" class="inp" style="display:none;margin-top:6px" placeholder="نوع خدمت..." oninput="FORM.item=this.value">
      </div>
      <div class="s2" style="position:relative">
        <label>نام مشتری</label>
        <input id="f-cust" class="inp" placeholder="نام مشتری..." oninput="FORM.cust=this.value;showCustDrop()">
        <div id="cust-drop"></div>
      </div>
      <div class="s2">
        <label>شماره تماس</label>
        <input id="f-phone" class="inp" placeholder="۰۹۱۲..." oninput="FORM.phone=this.value">
      </div>
      <div id="gf" style="display:contents">
        <div><label>وزن (گرم)</label><input id="f-w" class="inp" type="number" inputmode="decimal" placeholder="5.2" oninput="FORM.weight=this.value;liveCalc()"></div>
        <div><label>عیار</label>
          <select id="f-karat" class="inp" onchange="FORM.karat=this.value">
            <option value="18">18</option><option value="21">21</option><option value="22">22</option><option value="24">24</option>
          </select>
        </div>
        <div><label>اجرت %</label><input id="f-wp" class="inp" type="number" inputmode="decimal" value="10" oninput="FORM.wp=this.value;liveCalc()"></div>
        <div><label>سود %</label><input id="f-pp" class="inp" type="number" inputmode="decimal" value="7" oninput="FORM.pp=this.value;liveCalc()"></div>
        <div><label>مالیات %</label><input id="f-vp" class="inp" type="number" inputmode="decimal" value="10" oninput="FORM.vp=this.value;liveCalc()"></div>
        <div class="s2"><label>قیمت هر گرم (تومان)</label><input id="f-ppg" class="inp" type="number" inputmode="numeric" placeholder="16,148,000" oninput="FORM.ppg=this.value;liveCalc()"></div>
        <div class="s2"><label>پرداخت شده (تومان)</label><input id="f-paid" class="inp" type="number" inputmode="numeric" placeholder="0 = نسیه کامل" oninput="FORM.paid=this.value;liveCalc()"></div>
      </div>
      <div id="sf" style="display:none;grid-column:span 2">
        <label>هزینه خدمت (تومان)</label>
        <input id="f-sfee" class="inp" type="number" inputmode="numeric" placeholder="500,000" oninput="FORM.sfee=this.value">
      </div>
      <div id="sgf" style="display:none;contents">
        <div><label>وزن دریافتی (گرم)</label><input id="f-dep" class="inp" type="number" inputmode="decimal" placeholder="اختیاری" oninput="FORM.depositGram=this.value"></div>
        <div><label>وزن تحویلی (گرم)</label><input id="f-pgram" class="inp" type="number" inputmode="decimal" placeholder="اختیاری" oninput="FORM.paidGram=this.value"></div>
      </div>
      <div id="df" style="display:none;contents">
        <div class="s2"><label>وزن طلای امانتی (گرم) *</label><input id="f-depg" class="inp" type="number" inputmode="decimal" placeholder="10.5" oninput="FORM.depositGram=this.value"></div>
        <div><label>عیار</label>
          <select id="f-dk" class="inp" onchange="FORM.karat=this.value">
            <option value="18">18</option><option value="21">21</option><option value="22">22</option><option value="24">24</option>
          </select>
        </div>
        <div><label>وزن تحویل داده شده (گرم)</label><input id="f-dpg" class="inp" type="number" inputmode="decimal" placeholder="0" oninput="FORM.paidGram=this.value"></div>
      </div>
      <div class="s2"><label>یادداشت</label><input id="f-note" class="inp" placeholder="توضیحات..." oninput="FORM.note=this.value"></div>
    </div>
    <div id="price-box" class="pbox" style="display:none">
      <div class="stitle">📊 محاسبه قیمت</div>
      <div class="pr"><span style="color:#666">ارزش طلا</span><span id="pc-gv" style="color:#eee;font-weight:600"></span></div>
      <div class="pr"><span style="color:#666">اجرت ساخت</span><span id="pc-w" style="color:#a78bfa;font-weight:600"></span></div>
      <div class="pr"><span style="color:#666">سود فروشنده</span><span id="pc-p" style="color:#60a5fa;font-weight:600"></span></div>
      <div class="pr"><span style="color:#666">مالیات</span><span id="pc-v" style="color:#fb923c;font-weight:600"></span></div>
      <div class="pr"><span style="color:#666">جمع کل</span><span id="pc-tot" style="color:#c9a84c;font-weight:800;font-size:14px"></span></div>
      <div class="pr"><span style="color:#666">پرداخت شده</span><span id="pc-paid" style="color:#4ade80;font-weight:600"></span></div>
      <div style="display:flex;justify-content:space-between;padding-top:8px">
        <span style="color:#f87171;font-weight:800;font-size:13px">مانده</span>
        <span id="pc-bal" style="color:#f87171;font-weight:800;font-size:15px"></span>
      </div>
    </div>
    <button id="sub-btn" class="bgold" onclick="submitTx()">✓ ثبت</button>
  </div>
</div>

<div id="pg-other" style="padding:12px;max-width:700px;margin:0 auto;padding-bottom:40px"></div>
<div id="modal-cont"></div>

<script>
// ══ تاریخ شمسی ═══════════════════════════════════════════════════════
function toJalali(date){
  const d=date||new Date();
  try{
    const p=new Intl.DateTimeFormat('fa-IR-u-ca-persian',{year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);
    const n=s=>s.replace(/[۰-۹]/g,c=>String(c.charCodeAt(0)-1776));
    const g=t=>+n(p.find(x=>x.type===t)?.value||'0');
    return{y:g('year'),m:g('month'),d:g('day')};
  }catch{return{y:d.getFullYear()-621,m:d.getMonth()+1,d:d.getDate()};}
}
function jStr(d){const j=toJalali(d);return`${j.y}/${String(j.m).padStart(2,'0')}/${String(j.d).padStart(2,'0')}`;}
function jMonth(m){return['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'][m-1]||'';}
function jCmp(a,b){if(!a||!b)return 0;const pa=a.split('/').map(Number),pb=b.split('/').map(Number);for(let i=0;i<3;i++)if(pa[i]!==pb[i])return pa[i]-pb[i];return 0;}
function today(){return jStr();}

// ══ داده ════════════════════════════════════════════════════════════════
const SK='gold_v6';
function initDB(){return{tx:[],inv:[],cust:[],products:[]};}
let DB=(()=>{try{return JSON.parse(localStorage.getItem(SK))||initDB();}catch{return initDB();}})();
function save(){try{localStorage.setItem(SK,JSON.stringify(DB));}catch{}}
let apiKey=localStorage.getItem('gkey')||'';

// ══ state ════════════════════════════════════════════════════════════════
let FORM={type:'sell',item:'',itemCode:'',weight:'',ppg:'',karat:'18',cust:'',phone:'',note:'',wp:'10',pp:'7',vp:'10',sfee:'',paid:'',depositGram:'',paidGram:''};
let TAB='dashboard',MODAL=null,MD={};
let RPT={from:'',to:'',type:'all'};
let SQ={tx:'',cust:'',prod:'',activeCust:null};

// ══ helpers ══════════════════════════════════════════════════════════════
const _=id=>document.getElementById(id);
function fmt(n){if(!n||n==0)return'—';return Number(n).toLocaleString('fa-IR')+' ت';}
function fmtG(n){if(!n||n==0)return'—';return Number(n).toFixed(3)+' گ';}
function badgeH(t){
  const m={buy:['#1a3a2a','#4ade80','خرید طلا'],buycash:['#1a2a1a','#a3e635','خرید نقدی'],sell:['#3a1a1a','#f87171','فروش'],service:['#1a1a3a','#a78bfa','خدمات'],deposit:['#1a2a3a','#60a5fa','امانت'],payment:['#2a2a1a','#facc15','پرداخت'],return:['#3a1a2a','#fb7185','مرجوعی']};
  const[bg,c,l]=m[t]||['#222','#888','—'];
  return`<span class="badge" style="background:${bg};color:${c}">${l}</span>`;
}
function statH(label,val,accent){return`<div class="stat" style="border:1px solid ${accent}33"><div style="color:#666;font-size:11px;margin-bottom:3px">${label}</div><div style="color:${accent};font-size:13px;font-weight:800">${val}</div></div>`;}

// ══ محاسبه — فرمول دقیق ═══════════════════════════════════════════════
function calcP(){
  if(!FORM.ppg||!FORM.weight)return null;
  const gv=(+FORM.ppg)*(+FORM.weight);
  const w=gv*(+FORM.wp||0)/100;
  const p=(gv+w)*(+FORM.pp||0)/100;
  const v=(w+p)*(+FORM.vp||0)/100;
  return{gv,w,p,v,total:gv+w+p+v};
}
function liveCalc(){
  if(FORM.type==='service'||FORM.type==='deposit'){_('price-box').style.display='none';return;}
  const c=calcP(),box=_('price-box');
  if(!c){box.style.display='none';return;}
  box.style.display='';
  const s=(id,v)=>{const el=_(id);if(el)el.textContent=v;};
  s('pc-gv',fmt(c.gv));s('pc-w',fmt(c.w));s('pc-p',fmt(c.p));s('pc-v',fmt(c.v));s('pc-tot',fmt(c.total));
  s('pc-paid',fmt(+FORM.paid||0));s('pc-bal',fmt(c.total-(+FORM.paid||0)));
}

// ══ نوع تراکنش ══════════════════════════════════════════════════════════
function setType(t){
  FORM.type=t;
  const cols={buy:'#4ade80',buycash:'#a3e635',sell:'#f87171',service:'#a78bfa',deposit:'#60a5fa'};
  document.querySelectorAll('.type-btn').forEach(b=>{
    const v=b.getAttribute('data-v'),c=cols[v]||'#888';
    b.style.background=v===t?c+'22':'#1a1a1a';b.style.color=v===t?c:'#555';
    b.style.border=`1px solid ${v===t?c+'55':'#2a2a2a'}`;
  });
  const isG=t==='buy'||t==='sell'||t==='buycash',isS=t==='service',isD=t==='deposit';
  _('row-item').style.display=isS?'none':'';_('row-svc').style.display=isS?'':'none';
  _('gf').style.display=isG?'contents':'none';
  _('sf').style.display=isS?'':'none';_('sgf').style.display=isS?'contents':'none';
  _('df').style.display=isD?'contents':'none';
  liveCalc();
}

// ══ انتخاب محصول ════════════════════════════════════════════════════════
function pickProd(id){
  const p=DB.products.find(x=>x.id==id);
  if(!p)return;
  FORM.item=p.name;FORM.itemCode=p.code||'';FORM.karat=p.karat||'18';
  FORM.wp=String(p.wp??10);FORM.pp=String(p.pp??7);FORM.vp=String(p.vp??10);
  FORM.weight=p.weight?String(p.weight):'';
  _('f-item').value=p.name;_('f-karat').value=p.karat||'18';
  _('f-wp').value=p.wp??10;_('f-pp').value=p.pp??7;_('f-vp').value=p.vp??10;
  _('f-w').value=p.weight||'';
  _('quick-inp').value='';_('quick-drop').innerHTML='';
  _('sel-prod').style.display='block';
  _('sel-name').textContent=`${p.name}${p.code?' #'+p.code:''}`;
  _('sel-info').textContent=`عیار ${p.karat||18} · وزن ${p.weight||'متغیر'} گ · اجرت ${p.wp??0}٪ · سود ${p.pp??0}٪ · مالیات ${p.vp??0}٪`;
  setTimeout(()=>_('f-ppg')?.focus(),100);
  liveCalc();
}
function clearProd(){
  FORM.item='';FORM.itemCode='';FORM.weight='';
  _('f-item').value='';_('f-w').value='';
  _('sel-prod').style.display='none';_('quick-inp').value='';liveCalc();
}

// جستجوی سریع — فقط dropdown آپدیت میشه، بدون re-render
_('quick-inp').addEventListener('input',function(){
  const v=this.value.trim();
  if(!v){_('quick-drop').innerHTML='';return;}
  const list=DB.products.filter(p=>p.name.includes(v)||(p.code||'').toLowerCase().includes(v.toLowerCase())).slice(0,6);
  if(!list.length){_('quick-drop').innerHTML='';return;}
  _('quick-drop').innerHTML='<div class="drop">'+list.map(p=>
    `<div class="di" onmousedown="pickProd(${p.id})">
      <span style="font-weight:700">${p.name}</span>
      ${p.code?`<span style="color:#c9a84c;font-size:11px;margin-right:6px">#${p.code}</span>`:''}
      <span style="color:#555;font-size:10px;margin-right:4px">عیار ${p.karat||18}${p.weight?' · '+p.weight+'گ':''} · اجرت ${p.wp??0}٪ · سود ${p.pp??0}٪ · مالیات ${p.vp??0}٪</span>
    </div>`).join('')+'</div>';
});

function showCustDrop(){
  const v=FORM.cust,el=_('cust-drop');if(!el)return;
  const list=v?DB.cust.filter(c=>c.name.includes(v)||(c.phone||'').includes(v)).slice(0,5):[];
  el.innerHTML=list.length?'<div class="drop">'+list.map(c=>
    `<div class="di" onmousedown="pickCust(${c.id})">${c.name}${c.phone?` <span style="color:#555;font-size:11px">${c.phone}</span>`:''}</div>`
  ).join('')+'</div>':'';
}
function pickCust(id){
  const c=DB.cust.find(x=>x.id==id);if(!c)return;
  FORM.cust=c.name;FORM.phone=c.phone||'';
  _('f-cust').value=c.name;_('f-phone').value=c.phone||'';
  _('cust-drop').innerHTML='';
}
function onSvcChange(v){FORM.item=v==='__o'?'':v;_('f-svc-o').style.display=v==='__o'?'':'none';}

// ══ ثبت تراکنش ══════════════════════════════════════════════════════════
function submitTx(){
  const item=_('f-item')?.value||FORM.item;
  if(!item){alert('نام کالا یا خدمت را وارد کنید');return;}
  FORM.item=item;
  const c=(FORM.type==='buy'||FORM.type==='sell'||FORM.type==='buycash')?calcP():null;
  const total=c?c.total:(FORM.type==='service'?+FORM.sfee||0:0);
  const paid=+FORM.paid||0,bal=total-paid;
  const tx={id:Date.now(),date:today(),type:FORM.type,item:FORM.item,itemCode:FORM.itemCode,
    w:FORM.weight,karat:FORM.karat,ppg:FORM.ppg,cust:FORM.cust,phone:FORM.phone,
    note:FORM.note,wp:FORM.wp,pp:FORM.pp,vp:FORM.vp,
    gv:c?c.gv:0,wage:c?c.w:0,profit:c?c.p:0,vat:c?c.v:0,
    total,paid,balance:bal,sfee:FORM.sfee,depositGram:FORM.depositGram,paidGram:FORM.paidGram};
  // مشتری
  if(FORM.cust){
    const idx=DB.cust.findIndex(x=>x.name===FORM.cust);
    if(idx>=0){
      DB.cust[idx].phone=FORM.phone||DB.cust[idx].phone;
      DB.cust[idx].txCount=(DB.cust[idx].txCount||0)+1;DB.cust[idx].last=today();
      DB.cust[idx].debtRial=(DB.cust[idx].debtRial||0)+bal;
      if(FORM.type==='deposit')DB.cust[idx].debtGram=(DB.cust[idx].debtGram||0)+(+FORM.depositGram||0);
      if((FORM.type==='service'||FORM.type==='deposit')&&FORM.paidGram)
        DB.cust[idx].debtGram=Math.max(0,(DB.cust[idx].debtGram||0)-(+FORM.paidGram||0));
    }else{
      DB.cust.push({id:Date.now(),name:FORM.cust,phone:FORM.phone||'',txCount:1,last:today(),
        debtRial:bal,debtGram:FORM.type==='deposit'?(+FORM.depositGram||0):0});
    }
  }
  // موجودی
  if(FORM.type==='buy'){
    const idx=DB.inv.findIndex(i=>i.item===FORM.item&&i.karat===FORM.karat);
    if(idx>=0){DB.inv[idx].w=(+DB.inv[idx].w+(+FORM.weight||0)).toFixed(3);}
    else DB.inv.push({id:Date.now(),item:FORM.item,itemCode:FORM.itemCode,karat:FORM.karat,w:+FORM.weight||0});
  }else if(FORM.type==='sell'){
    const idx=DB.inv.findIndex(i=>i.item===FORM.item&&i.karat===FORM.karat);
    if(idx>=0){
      const nw=Math.max(0,+DB.inv[idx].w-(+FORM.weight||0));
      if(nw<=0)DB.inv.splice(idx,1);
      else DB.inv[idx].w=nw.toFixed(3);
    }
  }
  DB.tx.unshift(tx);save();
  resetForm();TAB='dashboard';showTab();
}

function dashH(){
  const j=toJalali(),tm=`${j.y}/${String(j.m).padStart(2,'0')}`,td=today();
  // مجموع مبلغ مرجوعی شده برای هر تراکنش اصلی (چه کامل چه جزئی)
  const returnedAmountByTx={};
  DB.tx.filter(t=>t.type==='return'&&t.refTx).forEach(r=>{
    returnedAmountByTx[r.refTx]=(returnedAmountByTx[r.refTx]||0)+(+r.total||0);
  });
  const returnedProfitByTx={};
  DB.tx.filter(t=>t.type==='return'&&t.refTx).forEach(r=>{
    const orig=DB.tx.find(o=>o.id===r.refTx);
    if(orig&&orig.total>0){
      // نسبت مرجوعی از کل، برای کسر متناسب سود
      const ratio=(+r.total||0)/(+orig.total||1);
      returnedProfitByTx[r.refTx]=(returnedProfitByTx[r.refTx]||0)+ratio*(+orig.profit||0);
    }
  });

  const s=(f,k)=>DB.tx.filter(f).reduce((a,t)=>a+(+t[k]||0),0);
  // فروش خالص = فروش - مبلغ مرجوعی شده از همون تراکنش
  const netSell=(filterFn)=>DB.tx.filter(t=>t.type==='sell'&&filterFn(t)).reduce((a,t)=>a+((+t.total||0)-(returnedAmountByTx[t.id]||0)),0);
  const netBuy=(filterFn)=>DB.tx.filter(t=>(t.type==='buy'||t.type==='buycash')&&filterFn(t)).reduce((a,t)=>a+((+t.total||0)-(returnedAmountByTx[t.id]||0)),0);
  const netProfit=(filterFn)=>DB.tx.filter(t=>t.type==='sell'&&filterFn(t)).reduce((a,t)=>a+((+t.profit||0)-(returnedProfitByTx[t.id]||0)),0);

  const tdS=netSell(t=>t.date===td);
  const tdB=netBuy(t=>t.date===td);
  const tdSv=s(t=>t.type==='service'&&t.date===td,'sfee');
  const mS=netSell(t=>(t.date||'').startsWith(tm));
  const mB=netBuy(t=>(t.date||'').startsWith(tm));
  const mProfit=netProfit(t=>(t.date||'').startsWith(tm));
  const mSv=s(t=>t.type==='service'&&(t.date||'').startsWith(tm),'sfee');
  const tg=DB.inv.reduce((a,i)=>a+(+i.w||0),0);
  const debtors=DB.cust.filter(c=>(c.debtRial||0)>0||(c.debtGram||0)>0).length;
  const recent=DB.tx.slice(0,6).map(t=>`
    <div class="tx-row">
      <div style="display:flex;gap:8px;align-items:center">${badgeH(t.type)}

        <div style="color:#444;font-size:10px">${t.date}${t.cust?' · '+t.cust:''}</div></div>
      </div>
      <div style="color:${t.type==='sell'?'#f87171':t.type==='payment'?'#facc15':t.type==='service'?'#a78bfa':'#4ade80'};font-weight:700;font-size:12px">
        ${fmt(t.type==='service'?t.sfee:t.type==='payment'?t.paid:t.total)}</div>
    </div>`).join('');
  const dayPrice=+localStorage.getItem('gold_day_price')||0;
  const invList=DB.inv.length?DB.inv.map(i=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1a1a1a">
      <div><span style="font-weight:700;font-size:13px">${i.item}</span>${i.itemCode?` <span style="color:#c9a84c;font-size:10px">#${i.itemCode}</span>`:''}<div style="color:#555;font-size:10px">عیار ${i.karat||'—'}</div></div>
      <div style="text-align:left">
        <div style="color:#c9a84c;font-weight:700;font-size:14px">${(+i.w||0).toFixed(3)} گرم</div>
        ${dayPrice?`<div style="color:#fb923c;font-size:10px">${((+i.w||0)*dayPrice).toLocaleString('fa-IR')} ت</div>`:''}
      </div>
    </div>`).join(''):'<div class="empty" style="padding:20px">موجودی ثبت نشده</div>';
  const dp=+localStorage.getItem('gold_day_price')||0;
  const totalRialVal=DB.inv.reduce((a,i)=>a+(+i.w||0)*dp,0);
  return`
  <div style="color:#555;font-size:11px;margin-bottom:8px">📅 ${td} — ${jMonth(j.m)} ${j.y}</div>
  <div class="card" style="background:#1a1a0a;border-color:#c9a84c55;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="color:#c9a84c;font-weight:700;font-size:13px">💰 قیمت روز طلا (هر گرم ۱۸ عیار)</div>
      ${dp?`<div style="color:#fb923c;font-size:11px">ارزش موجودی: <b>${totalRialVal.toLocaleString('fa-IR')} ت</b></div>`:''}
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
      <input class="inp" id="day-price-inp" type="number" inputmode="numeric" value="${dp||''}" placeholder="مثلاً 16,400,000" style="flex:1">
      <button class="btn" onclick="saveDayPrice()" style="background:#c9a84c;color:#000;white-space:nowrap">ثبت قیمت</button>
    </div>

  <div class="card"><div class="stitle">📦 موجودی</div>${invList}
    ${DB.inv.length?`<div style="color:#c9a84c;font-weight:800;font-size:14px;text-align:left;padding-top:8px;border-top:1px solid #2a2a2a;margin-top:4px">جمع موجودی: ${fmtG(tg)}</div>`:''}
  </div>
  <div class="card"><div class="stitle">آخرین تراکنش‌ها</div>
    ${DB.tx.length===0?'<div class="empty">هنوز تراکنشی ثبت نشده</div>':recent}
  </div>`;
}

// ══ مشتریان ══════════════════════════════════════════════════════════════
function custH(){
  if(SQ.activeCust)return custProfileH(SQ.activeCust);
  const q=SQ.cust;
  const all=q?DB.cust.filter(c=>c.name.includes(q)||(c.phone||'').includes(q)):DB.cust;
  const debtors=all.filter(c=>(c.debtRial||0)>0||(c.debtGram||0)>0);
  const settled=all.filter(c=>!((c.debtRial||0)>0||(c.debtGram||0)>0));
  function cc(c){
    const ctx=DB.tx.filter(t=>t.cust===c.name);
    const cS=ctx.filter(t=>t.type==='sell').reduce((a,t)=>a+(+t.total||0),0);

        ${cB>0?`<div style="background:#1a3a1a;border-radius:6px;padding:3px 8px;font-size:11px"><span style="color:#666">خرید: </span><span style="color:#4ade80">${fmt(cB)}</span></div>`:''}
        ${cSv>0?`<div style="background:#1a1a2a;border-radius:6px;padding:3px 8px;font-size:11px"><span style="color:#666">خدمات: </span><span style="color:#a78bfa">${fmt(cSv)}</span></div>`:''}

  <input class="inp" value="${q}" placeholder="جستجو نام یا شماره..." oninput="SQ.cust=this.value;filterCust()" style="margin-bottom:12px">

    ${!DB.cust.length?'<div class="empty">هنوز مشتری ثبت نشده</div>':''}
  </div>`;
}

function filterCust(){
  const q=SQ.cust;
  const all=q?DB.cust.filter(c=>c.name.includes(q)||(c.phone||'').includes(q)):DB.cust;
  const el=_('cust-list');if(!el)return;
  if(!all.length){el.innerHTML='<div class="empty">مشتری یافت نشد</div>';return;}
  el.innerHTML=all.map(c=>`
    <div class="card" style="margin-bottom:8px;cursor:pointer" onclick="openCustProfile(${c.id})">
      <div style="font-weight:800;font-size:14px;color:#c9a84c">${c.name}</div>
      ${c.phone?`<div style="color:#555;font-size:11px;margin-top:2px">📞 ${c.phone}</div>`:''}
      <div style="color:#444;font-size:10px;margin-top:2px">${c.last||'—'} · ${c.txCount||0} تراکنش
        ${(c.debtRial||0)>0?`<span style="color:#f87171;margin-right:6px">بدهی: ${fmt(c.debtRial)}</span>`:''}
      </div>
    </div>`).join('');
}

function openCustProfile(id){SQ.activeCust=id;renderOther();}

        ${t.w?`<span class="tag">⚖️ ${t.w}گ</span>`:''}${t.karat&&t.type!=='service'&&t.type!=='payment'?`<span class="tag">✨ ${t.karat}</span>`:''}
        ${t.depositGram?`<span class="tag">📥 ${t.depositGram}گ</span>`:''}${t.paidGram?`<span class="tag">📤 ${t.paidGram}گ</span>`:''}
        ${t.note?`<span class="tag">📝 ${t.note}</span>`:''}
      </div>
    </div>`).join('');
  return`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">

      </div>

    </div>
  </div>
  <div class="row" style="flex-wrap:wrap;margin-bottom:10px">
    ${statH('فروش به',fmt(totSell),'#f87171')}${statH('خرید از',fmt(totBuy),'#4ade80')}${statH('خدمات',fmt(totSvc),'#a78bfa')}
  </div>
  <div class="card" style="background:#1a1a0a;border-color:#c9a84c44">
    <div class="stitle">🧾 صورتحساب اشخاص (تراز نهایی)</div>
    <div class="g2">
      <div style="background:${(c.debtRial||0)>0?'#3a1a1a':'#1a2a1a'};border-radius:8px;padding:10px;text-align:center">
        <div style="color:#888;font-size:11px;margin-bottom:4px">مانده ریالی</div>
        <div style="color:${(c.debtRial||0)>0?'#f87171':'#4ade80'};font-weight:800;font-size:16px">${(c.debtRial||0)>0?fmt(c.debtRial):'تسویه'}</div>
        <div style="color:#555;font-size:10px;margin-top:2px">${(c.debtRial||0)>0?'بدهکار به فروشگاه':''}</div>
      </div>
      <div style="background:${(c.debtGram||0)>0?'#1a2a3a':'#1a2a1a'};border-radius:8px;padding:10px;text-align:center">

}

function saveProd(editId){
  const name=_('np-name').value.trim();if(!name){alert('نام الزامی');return;}
  const code=_('np-code').value.trim(),karat=_('np-karat').value;
  const weight=+(_('np-w')?.value||0)||null;
  const wp=+(_('np-wp')?.value??10),pp=+(_('np-pp')?.value??7),vp=+(_('np-vp')?.value??10);
  if(editId){
    const idx=DB.products.findIndex(p=>p.id==editId);
    if(idx>=0){
      const old=DB.products[idx];
      DB.products[idx]={...old,name,code,karat,weight,wp,pp,vp};
      // آپدیت موجودی
      const invIdx=DB.inv.findIndex(i=>i.item===old.name&&i.karat===old.karat);
      const ew=_('np-ew')?.value;
      if(invIdx>=0){
        DB.inv[invIdx].item=name;DB.inv[invIdx].itemCode=code;DB.inv[invIdx].karat=karat;
        if(ew!=null&&ew!=='')DB.inv[invIdx].w=(+ew).toFixed(3);
        else if(weight)DB.inv[invIdx].w=(+weight).toFixed(3);
      }else if((ew&&+ew>0)||weight){
        DB.inv.push({id:Date.now(),item:name,itemCode:code,karat,w:ew?(+ew).toFixed(3):(+weight||0).toFixed(3)});
      }
      // آپدیت تراکنش‌ها
      if(old.name!==name||old.karat!==karat)
        DB.tx.forEach(t=>{if(t.item===old.name&&t.karat===old.karat){t.item=name;t.itemCode=code;t.karat=karat;}});
    }
  }else{
    DB.products.push({id:Date.now(),name,code,karat,weight,wp,pp,vp});
    const iwVal=_('np-iw')?.value?.trim();
    const iw=iwVal?+iwVal:(weight||0);
    if(iw>0){
      const idx=DB.inv.findIndex(i=>i.item===name&&i.karat===karat);
      if(idx>=0){DB.inv[idx].w=(+DB.inv[idx].w+iw).toFixed(3);}
      else DB.inv.push({id:Date.now(),item:name,itemCode:code,karat,w:iw.toFixed(3)});
    }
  }
  save();closeModal();renderOther();
}

function delProd(id){
  if(!confirm('حذف شود؟'))return;
  const p=DB.products.find(x=>x.id==id);
  if(p){
    // حذف موجودی مرتبط
    DB.inv=DB.inv.filter(i=>!(i.item===p.name&&i.karat===p.karat));

function submitPay(){
  const c=MD.cust,rial=+_('pay-r').value||0,gram=+_('pay-g').value||0,note=_('pay-n').value||'';
  if(!rial&&!gram){alert('مبلغ یا گرم وارد کنید');return;}
  const idx=DB.cust.findIndex(x=>x.name===c.name);
  if(idx>=0){DB.cust[idx].debtRial=Math.max(0,(DB.cust[idx].debtRial||0)-rial);DB.cust[idx].debtGram=Math.max(0,(DB.cust[idx].debtGram||0)-gram);}
  DB.tx.unshift({id:Date.now(),date:today(),type:'payment',item:'پرداخت حساب',cust:c.name,paid:rial,paidGram:gram,note,total:0,balance:0,gv:0,wage:0,profit:0,vat:0});
  save();closeModal();TAB='customers';showTab();
}

function submitReturn(txId){
  const t=DB.tx.find(x=>x.id==txId);
  if(!t)return;
  const retType=document.getElementById('ret-type').value;
  const note=document.getElementById('ret-note').value||'';
  const isSell=t.type==='sell';
  const isBuy=t.type==='buy'||t.type==='buycash';

  let retW, retAmount;
  if(retType==='full'){
    retW = +t.w||0;
    retAmount = +t.total||0;
  } else {
    retW = +document.getElementById('ret-w').value||0;
    retAmount = +document.getElementById('ret-amount').value||0;
    if(!retW && !retAmount){alert('وزن یا مبلغ مرجوعی را وارد کنید');return;}
  }

  // آپدیت موجودی
  if(isSell && retW>0){
    // فروش مرجوع شد → موجودی برمیگرده (اضافه میشه)
    const idx=DB.inv.findIndex(i=>i.item===t.item&&i.karat===t.karat);
    if(idx>=0) DB.inv[idx].w=(+DB.inv[idx].w+retW).toFixed(3);
    else DB.inv.push({id:Date.now(),item:t.item,itemCode:t.itemCode,karat:t.karat,w:retW.toFixed(3)});
  } else if(isBuy && retW>0){
    // خرید مرجوع شد → موجودی کم میشه
    const idx=DB.inv.findIndex(i=>i.item===t.item&&i.karat===t.karat);
    if(idx>=0){
      const nw=Math.max(0,+DB.inv[idx].w-retW);
      if(nw<=0) DB.inv.splice(idx,1);
      else DB.inv[idx].w=nw.toFixed(3);
    }
  }

  // آپدیت مانده مشتری
  if(t.cust){
    const cidx=DB.cust.findIndex(c=>c.name===t.cust);
    if(cidx>=0){
      if(isSell){
        // فروش مرجوع شد → بدهی مشتری کم میشه (چون دیگه بدهکار این مبلغ نیست)
        DB.cust[cidx].debtRial=(DB.cust[cidx].debtRial||0)-retAmount;
      } else if(isBuy){
        // خرید مرجوع شد → طلبی که به مشتری بدهکار بودیم کم میشه
        DB.cust[cidx].debtRial=(DB.cust[cidx].debtRial||0)+retAmount;
      }
    }
  }

  // ثبت تراکنش مرجوعی
  DB.tx.unshift({
    id:Date.now(), date:today(), type:'return',
    item:t.item+' (مرجوعی)', itemCode:t.itemCode,
    w:retW||'', karat:t.karat, cust:t.cust, phone:t.phone,
    note:`مرجوع از تراکنش ${typeLabelFa(t.type)} — ${note}`,
    total:retAmount, paid:retAmount, balance:0,
    gv:0,wage:0,profit:0,vat:0, refTx:t.id
  });

  // علامت‌گذاری تراکنش اصلی
  if(retType==='full'){
    t.returned=true;
  } else {
    t.returned='partial';
  }

  save();closeModal();renderOther();
}

function typeLabelFa(t){
  return{buy:'خرید طلا',buycash:'خرید نقدی',sell:'فروش',service:'خدمات',deposit:'امانت'}[t]||t;
}

function importBackup(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.db||!data.db.tx){alert('فایل معتبر نیست');return;}
      if(!confirm(`بازیابی از فایل ${data.date||''}؟\n${data.db.tx.length} تراکنش\nداده‌های فعلی پاک میشه`))return;
      DB={tx:data.db.tx||[],inv:data.db.inv||[],cust:data.db.cust||[],products:data.db.products||[]};
      save();alert('بازیابی موفق ✅');closeModal();TAB='dashboard';showTab();
    }catch(err){alert('خطا: '+err.message);}
  };r.readAsText(file);
}

function exportCSV(){
  const h='تاریخ,نوع,کالا,کد,گرم,عیار,قیمت هر گرم,ارزش طلا,اجرت,سود,مالیات,قیمت نهایی,پرداخت,مانده,مشتری,تلفن,یادداشت\n';
  const rows=DB.tx.map(t=>[t.date,{buy:'خرید طلا',buycash:'خرید نقدی',sell:'فروش',service:'خدمات',deposit:'امانت',payment:'پرداخت',return:'مرجوعی'}[t.type]||'',t.item||'',t.itemCode||'',t.w||'',t.karat||'',t.ppg||'',t.gv||'',t.wage||'',t.profit||'',t.vat||'',t.total||'',t.paid||'',t.balance||'',t.cust||'',t.phone||'',t.note||''].join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+h+rows],{type:'text/csv;charset=utf-8;'}));a.download='حسابداری_طلا.csv';a.click();
}
